name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build image and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run from a git tag." >&2
            exit 1
          fi

          git fetch origin main --tags --force

          tag="${GITHUB_REF_NAME}"
          tag_sha="$(git rev-list -n 1 "${tag}")"

          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          version="${tag#v}"
          previous_tag="$(git describe --tags --abbrev=0 "${tag_sha}^" --match 'v[0-9]*' 2>/dev/null || true)"

          {
            echo "tag=${tag}"
            echo "tag_sha=${tag_sha}"
            echo "version=${version}"
            echo "image=${image}"
            echo "previous_tag=${previous_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(steps.release.outputs.tag, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TAG_SHA: ${{ steps.release.outputs.tag_sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          tag_sha="${RELEASE_TAG_SHA}"
          version="${RELEASE_VERSION}"
          image="${RELEASE_IMAGE}"
          previous_tag="${PREVIOUS_TAG}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          if [[ -z "${previous_tag}" ]]; then
            cp docs/releases/initial-release.md "${notes_file}"
          else
            {
              echo "## 1. 更新内容"
              echo
            } > "${notes_file}"

            has_release_notes=0

            append_commit_section() {
              section_number="$1"
              section_title="$2"
              commit_type="$3"
              section_file="${RUNNER_TEMP}/release-${commit_type}.txt"
              entries_file="${RUNNER_TEMP}/release-${commit_type}-entries.txt"
              commit_pattern="^${commit_type}(\\([^)]+\\))?!?:[[:space:]]"

              : > "${section_file}"
              : > "${entries_file}"
              commit_index=0

              while IFS= read -r -d '' commit_record; do
                subject="${commit_record%%$'\x1f'*}"
                rest="${commit_record#*$'\x1f'}"
                body="${rest%%$'\x1f'*}"
                short_sha="${rest##*$'\x1f'}"

                if [[ ! "${subject}" =~ ${commit_pattern} ]]; then
                  continue
                fi

                title="${subject#*: }"
                scope=""
                if [[ "${subject}" =~ ^${commit_type}\\(([^)]+)\\)!?: ]]; then
                  scope="${BASH_REMATCH[1]}"
                fi

                commit_file="${RUNNER_TEMP}/release-${commit_type}-${commit_index}.md"
                {
                  printf -- "- %s (%s)\n" "${title}" "${short_sha}"

                  if [[ -n "${body//[[:space:]]/}" ]]; then
                    echo
                    awk '
                      { lines[NR] = $0 }
                      END {
                        start = 1
                        end = NR
                        while (start <= end && lines[start] ~ /^[[:space:]]*$/) {
                          start++
                        }
                        while (end >= start && lines[end] ~ /^[[:space:]]*$/) {
                          end--
                        }
                        for (i = start; i <= end; i++) {
                          if (lines[i] ~ /^[[:space:]]*$/) {
                            print ""
                          } else {
                            printf "  %s\n", lines[i]
                          }
                        }
                      }
                    ' <<< "${body}"
                    echo
                  fi
                } > "${commit_file}"

                printf '%s\x1f%s\x1f%s\n' "${scope}" "${title}" "${commit_file}" >> "${entries_file}"
                ((commit_index += 1))
              done < <(git log -z "${previous_tag}..${tag_sha}" --no-merges --format="%s%x1f%b%x1f%h")

              while IFS=$'\x1f' read -r _ _ commit_file; do
                cat "${commit_file}" >> "${section_file}"
              done < <(LC_ALL=C sort -f -t $'\x1f' -k1,1 -k2,2 "${entries_file}")

              if [[ -s "${section_file}" ]]; then
                {
                  echo "### ${section_number}. ${section_title}"
                  echo
                  cat "${section_file}"
                  echo
                } >> "${notes_file}"
                has_release_notes=1
              fi
            }

            append_commit_section "1.1" "新功能" "feat"
            append_commit_section "1.2" "问题修复" "fix"
            append_commit_section "1.3" "性能优化" "perf"
            append_commit_section "1.4" "重构" "refactor"

            if [[ "${has_release_notes}" -eq 0 ]]; then
              {
                echo "本次发布没有 feat、fix、perf、refactor 类型的提交。"
                echo
              } >> "${notes_file}"
            fi
          fi

          {
            echo
            echo "## 2. 容器镜像"
            echo
            echo "- GHCR: \`${image}:${tag}\`"
            echo "- GHCR: \`${image}:${version}\`"
            if [[ "${tag}" != *-* ]]; then
              echo "- GHCR: \`${image}:latest\`"
            fi
          } >> "${notes_file}"

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.path }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          notes_file="${RELEASE_NOTES_FILE}"
          release_flags=()

          if [[ "${tag}" == *-* ]]; then
            release_flags+=(--prerelease --latest=false)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${tag}" --notes-file "${notes_file}" "${release_flags[@]}"
          else
            gh release create "${tag}" --verify-tag --title "${tag}" --notes-file "${notes_file}" "${release_flags[@]}"
          fi

      - name: Notify Telegram channel
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "::notice::Telegram notification skipped because TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured."
            exit 0
          fi

          message="$(printf '<b>MusicPilot %s 已发布</b>\n\n<a href=\"%s\">查看 GitHub Release</a>\nDocker 镜像：<code>%s:%s</code>' "${RELEASE_TAG}" "${RELEASE_URL}" "${RELEASE_IMAGE}" "${RELEASE_TAG}")"

          curl --fail --silent --show-error --retry 3 \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${message}"
