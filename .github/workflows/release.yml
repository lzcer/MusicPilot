name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_USERNAME: lzcer
  DOCKERHUB_IMAGE: docker.io/lzcer/musicpilot

jobs:
  publish:
    name: Build image and publish release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      release_url: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.release.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run from a git tag." >&2
            exit 1
          fi

          git fetch origin main --tags --force

          tag="${GITHUB_REF_NAME}"
          tag_sha="$(git rev-list -n 1 "${tag}")"

          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          dockerhub_image="${DOCKERHUB_IMAGE}"
          version="${tag#v}"
          previous_tag="$(git describe --tags --abbrev=0 "${tag_sha}^" --match 'v[0-9]*' 2>/dev/null || true)"

          {
            echo "tag=${tag}"
            echo "tag_sha=${tag_sha}"
            echo "version=${version}"
            echo "image=${image}"
            echo "dockerhub_image=${dockerhub_image}"
            echo "previous_tag=${previous_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.release.outputs.image }}
            ${{ steps.release.outputs.dockerhub_image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(steps.release.outputs.tag, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG_SHA: ${{ steps.release.outputs.tag_sha }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
        run: |
          set -euo pipefail

          tag_sha="${RELEASE_TAG_SHA}"
          previous_tag="${PREVIOUS_TAG}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          if [[ -z "${previous_tag}" ]]; then
            cp docs/releases/initial-release.md "${notes_file}"
          else
            {
              echo "## 1. 更新内容"
              echo
            } > "${notes_file}"

            has_release_notes=0

            append_commit_section() {
              section_number="$1"
              section_title="$2"
              commit_type="$3"
              section_file="${RUNNER_TEMP}/release-${commit_type}.txt"
              entries_file="${RUNNER_TEMP}/release-${commit_type}-entries.txt"
              commit_pattern="^${commit_type}(\\([^)]+\\))?!?:[[:space:]]"
              scope_pattern="^${commit_type}\\(([^)]+)\\)!?:"

              : > "${section_file}"
              : > "${entries_file}"
              commit_index=0

              while IFS= read -r -d '' commit_record; do
                subject="${commit_record%%$'\x1f'*}"
                rest="${commit_record#*$'\x1f'}"
                body="${rest%%$'\x1f'*}"
                short_sha="${rest##*$'\x1f'}"

                if [[ ! "${subject}" =~ ${commit_pattern} ]]; then
                  continue
                fi

                title="${subject#*: }"
                scope=""
                if [[ "${subject}" =~ ${scope_pattern} ]]; then
                  scope="${BASH_REMATCH[1]}"
                fi

                scope_sort_group=0
                if [[ -z "${scope}" ]]; then
                  scope_sort_group=1
                fi

                commit_file="${RUNNER_TEMP}/release-${commit_type}-${commit_index}.md"
                {
                  printf -- "- %s (%s)\n" "${title}" "${short_sha}"

                  if [[ -n "${body//[[:space:]]/}" ]]; then
                    echo
                    awk '
                      { lines[NR] = $0 }
                      END {
                        start = 1
                        end = NR
                        while (start <= end && lines[start] ~ /^[[:space:]]*$/) {
                          start++
                        }
                        while (end >= start && lines[end] ~ /^[[:space:]]*$/) {
                          end--
                        }
                        for (i = start; i <= end; i++) {
                          if (lines[i] ~ /^[[:space:]]*$/) {
                            print ""
                          } else {
                            printf "  %s\n", lines[i]
                          }
                        }
                      }
                    ' <<< "${body}"
                    echo
                  fi
                } > "${commit_file}"

                printf '%s\x1f%s\x1f%s\x1f%s\n' "${scope_sort_group}" "${scope}" "${title}" "${commit_file}" >> "${entries_file}"
                ((commit_index += 1))
              done < <(git log -z "${previous_tag}..${tag_sha}" --no-merges --format="%s%x1f%b%x1f%h")

              current_scope=""
              has_current_scope=0
              scope_index=0

              while IFS=$'\x1f' read -r _ scope _ commit_file; do
                if [[ "${has_current_scope}" -eq 0 || "${scope}" != "${current_scope}" ]]; then
                  if [[ "${has_current_scope}" -ne 0 ]]; then
                    echo >> "${section_file}"
                  fi

                  current_scope="${scope}"
                  has_current_scope=1
                  ((scope_index += 1))

                  if [[ -z "${scope}" ]]; then
                    scope="其他"
                  fi

                  printf '#### %s.%s. %s\n\n' "${section_number}" "${scope_index}" "${scope}" >> "${section_file}"
                fi

                cat "${commit_file}" >> "${section_file}"
              done < <(LC_ALL=C sort -f -t $'\x1f' -k1,1n -k2,2 -k3,3 "${entries_file}")

              if [[ -s "${section_file}" ]]; then
                {
                  echo "### ${section_number}. ${section_title}"
                  echo
                  cat "${section_file}"
                  echo
                } >> "${notes_file}"
                has_release_notes=1
              fi
            }

            append_commit_section "1.1" "新功能" "feat"
            append_commit_section "1.2" "问题修复" "fix"
            append_commit_section "1.3" "性能优化" "perf"
            append_commit_section "1.4" "重构" "refactor"

            if [[ "${has_release_notes}" -eq 0 ]]; then
              {
                echo "本次发布没有 feat、fix、perf、refactor 类型的提交。"
                echo
              } >> "${notes_file}"
            fi
          fi

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.path }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          notes_file="${RELEASE_NOTES_FILE}"
          release_flags=()

          if [[ "${tag}" == *-* ]]; then
            release_flags+=(--prerelease --latest=false)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${tag}" --notes-file "${notes_file}" "${release_flags[@]}"
          else
            gh release create "${tag}" --verify-tag --title "${tag}" --notes-file "${notes_file}" "${release_flags[@]}"
          fi

  notify_telegram:
    name: Notify Telegram channel
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Notify Telegram channel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_TAG: ${{ needs.publish.outputs.tag }}
          RELEASE_URL: ${{ needs.publish.outputs.release_url }}
        run: |
          set -euo pipefail

          if [[ -z "${TELEGRAM_BOT_TOKEN}" || -z "${TELEGRAM_CHAT_ID}" ]]; then
            echo "::notice::Telegram notification skipped because TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured."
            exit 0
          fi

          # Fetch release notes from the published GitHub Release
          notes="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body')"

          # Build message — start with the header
          message="<b>MusicPilot ${RELEASE_TAG} 已发布</b>"

          if [[ -n "${notes}" ]]; then
            # Keep the Telegram summary focused on release sections and commit subjects
            notes="$(printf '%s\n' "${notes}" | sed -e '/^## 1\. 更新内容$/d' -e '/^[[:space:]][[:space:]]/d')"

            # Escape HTML special chars first so user content won't break tags
            notes="$(echo "${notes}" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')"

            # Convert markdown headers → bold tags (e.g. "## 1.1. 新功能" → "<b>1.1. 新功能</b>")
            notes="$(echo "${notes}" | sed 's/^##* \(.*\)$/<b>\1<\/b>/')"

            # Convert inline code → <code> tags
            notes="$(echo "${notes}" | sed 's/`\([^`]*\)`/<code>\1<\/code>/g')"

            # Convert list markers to bullet points
            notes="$(echo "${notes}" | sed 's/^[[:space:]]*-[[:space:]]/• /')"

            # Trim blank lines and truncate if needed (Telegram limit: 4096 chars)
            notes="$(echo "${notes}" | sed '/^[[:space:]]*$/d')"
            if [[ ${#notes} -gt 3000 ]]; then
              notes="${notes:0:3000}..."
            fi

            # Append truncated notes to message
            message+=$'\n\n'"${notes}"
          fi

          # Footer: release link
          message+=$'\n\n'"<a href=\"${RELEASE_URL}\">查看 GitHub Release</a>"

          curl --fail --silent --show-error --retry 3 --connect-timeout 10 --max-time 30 \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${message}"
