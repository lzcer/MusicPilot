name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build image and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow must run from a git tag." >&2
            exit 1
          fi

          git fetch origin main --tags --force

          tag="${GITHUB_REF_NAME}"
          tag_sha="$(git rev-list -n 1 "${tag}")"

          if ! git merge-base --is-ancestor "${tag_sha}" origin/main; then
            echo "Tag ${tag} does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          version="${tag#v}"
          previous_tag="$(git describe --tags --abbrev=0 "${tag_sha}^" --match 'v[0-9]*' 2>/dev/null || true)"

          {
            echo "tag=${tag}"
            echo "tag_sha=${tag_sha}"
            echo "version=${version}"
            echo "image=${image}"
            echo "previous_tag=${previous_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.release.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(steps.release.outputs.tag, '-') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TAG_SHA: ${{ steps.release.outputs.tag_sha }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          tag_sha="${RELEASE_TAG_SHA}"
          version="${RELEASE_VERSION}"
          image="${RELEASE_IMAGE}"
          previous_tag="${PREVIOUS_TAG}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          if [[ -z "${previous_tag}" ]]; then
            cp docs/releases/initial-release.md "${notes_file}"
          else
            {
              echo "## 1. 更新内容"
              echo
              echo "以下内容根据 ${previous_tag} 到 ${tag} 之间的提交信息自动生成。"
              echo
              git log "${previous_tag}..${tag_sha}" --no-merges --pretty=format:"- %s (%h)"
              echo
            } > "${notes_file}"
          fi

          {
            echo
            echo "## 2. 容器镜像"
            echo
            echo "- GHCR: \`${image}:${tag}\`"
            echo "- GHCR: \`${image}:${version}\`"
            if [[ "${tag}" != *-* ]]; then
              echo "- GHCR: \`${image}:latest\`"
            fi
          } >> "${notes_file}"

          echo "path=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.path }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          notes_file="${RELEASE_NOTES_FILE}"
          release_flags=()

          if [[ "${tag}" == *-* ]]; then
            release_flags+=(--prerelease --latest=false)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${tag}" --notes-file "${notes_file}" "${release_flags[@]}"
          else
            gh release create "${tag}" --verify-tag --title "${tag}" --notes-file "${notes_file}" "${release_flags[@]}"
          fi
