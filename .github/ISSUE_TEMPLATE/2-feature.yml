name: ✨ 功能建议
description: 提议新功能或现有功能改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 请说明你遇到了什么问题，以及为什么需要这个功能。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 请描述期望的功能、操作流程或界面表现。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 可选方案
      description: 是否尝试过其他解决办法？

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 可以提供参考项目、截图或相关链接。

  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过现有 Issue，没有发现相同建议。
          required: true
        - label: 这是一项功能建议，不是使用咨询或故障排查请求。
          required: true
